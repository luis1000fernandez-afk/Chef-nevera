<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef Nevera 👨‍🍳</title>
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #2196F3;
            --bg: #1A1A1A;
            --card-bg: #2D2D2D;
            --text: #FFFFFF;
            --text-muted: #B0B0B0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .scroll-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 30px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 20px 0;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.1), rgba(33, 150, 243, 0.1));
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: relative; /* Necesario para posicionar el logo LSF */
        }

        h1 {
            background: linear-gradient(135deg, #4CAF50, #2196F3);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            font-weight: 800;
        }

        /* LOGO LSF EN LA ESQUINA DERECHA */
        .brand-logo {
            position: absolute;
            top: 20px;
            right: 20px;
            font-weight: 800;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #4CAF50, #2196F3);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.8;
        }

        .screen {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .welcome-card h2 {
            margin-bottom: 10px;
            font-weight: 700;
        }

        .welcome-card p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .photo-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.2);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .photo-btn:active {
            transform: scale(0.98);
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .image-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 4/3;
            background: #333;
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-img-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
        }

        .add-more-card {
            border: 2px dashed #555;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            cursor: pointer;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .secondary-btn {
            background: #333;
            border: 1px solid #444;
            flex: 1;
        }

        .primary-btn {
            flex: 2;
        }

        .loading-container {
            text-align: center;
            padding: 40px 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loadingSubtext {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tag {
            background: rgba(76, 175, 80, 0.1);
            color: var(--primary);
            border: 1px solid rgba(76, 175, 80, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .recipe-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .recipe-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .recipe-meta {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
        }

        .steps-list {
            padding-left: 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .steps-list li {
            margin-bottom: 10px;
            line-height: 1.5;
        }

        #fileInput { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>Chef Nevera 👨‍🍳</h1>
        <div class="brand-logo">LSF</div>
    </header>

    <div class="scroll-container">
        <div class="container">

            <input type="file" id="fileInput" accept="image/*" multiple>

            <div id="screen-home" class="screen active">
                <div class="welcome-card">
                    <h2>¿No sabes qué cocinar?</h2>
                    <p>Saca fotos de tu nevera o despensa y la Inteligencia Artificial te dirá qué preparar.</p>
                    <button class="photo-btn" onclick="triggerUpload()">
                        📸 Sacar / Subir Fotos
                    </button>
                </div>
            </div>

            <div id="screen-preview" class="screen">
                <div class="images-grid" id="previewGrid"></div>
                <div class="action-buttons">
                    <button class="photo-btn secondary-btn" onclick="resetApp()">🗑️ Borrar</button>
                    <button class="photo-btn primary-btn" onclick="analyzeImages()">✨ ¡Generar Recetas!</button>
                </div>
            </div>

            <div id="screen-loading" class="screen">
                <div class="loading-container">
                    <div class="spinner"></div>
                    <h2>Cocinando ideas...</h2>
                    <p id="loadingSubtext">Procesando imágenes...</p>
                </div>
            </div>

            <div id="screen-results" class="screen">
                <h3 style="margin-bottom: 10px; color: var(--text-muted);">Ingredientes detectados:</h3>
                <div class="tag-list" id="detectedIngredients"></div>

                <h3 style="margin-bottom: 15px; font-size: 1.5rem;">Recetas sugeridas:</h3>
                <div id="recipesContainer"></div>

                <button class="photo-btn" onclick="resetApp()" style="margin-top: 20px;">
                    ⬅️ Volver a empezar
                </button>
            </div>

        </div>
    </div>

    <script>
        let state = {
            images: [], 
            ingredients: [],
            recipes: []
        };

        const fileInput = document.getElementById('fileInput');
        const previewGrid = document.getElementById('previewGrid');
        const loadingSubtext = document.getElementById('loadingSubtext');

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${screenId}`).classList.add('active');
        }

        function triggerUpload() {
            fileInput.click();
        }

        // Sistema de auto-compresión para saltarse el tope de 4.5MB de Vercel
        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function(event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        const MAX_SIZE = 1024;
                        if (width > height) {
                            if (width > MAX_SIZE) {
                                height *= MAX_SIZE / width;
                                width = MAX_SIZE;
                            }
                        } else {
                            if (height > MAX_SIZE) {
                                width *= MAX_SIZE / height;
                                height = MAX_SIZE;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        resolve(compressedBase64);
                    }
                };
            });
        }

        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            for (let file of files) {
                const compressedBase64 = await compressImage(file);
                state.images.push({
                    mimeType: 'image/jpeg',
                    data: compressedBase64.split(',')[1] 
                });
            }

            renderPreview();
            showScreen('preview');
            fileInput.value = ''; 
        });

        function renderPreview() {
            previewGrid.innerHTML = '';
            
            state.images.forEach((img, index) => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.innerHTML = `
                    <img src="data:${img.mimeType};base64,${img.data}">
                    <button class="remove-img-btn" onclick="removeImage(${index})">×</button>
                `;
                previewGrid.appendChild(card);
            });

            const addMore = document.createElement('div');
            addMore.className = 'image-card add-more-card';
            addMore.innerHTML = `<span>+ Añadir más</span>`;
            addMore.onclick = triggerUpload;
            previewGrid.appendChild(addMore);
        }

        function removeImage(index) {
            state.images.splice(index, 1);
            if (state.images.length === 0) {
                resetApp();
            } else {
                renderPreview();
            }
        }

        function resetApp() {
            state = { images: [], ingredients: [], recipes: [] };
            fileInput.value = '';
            showScreen('home');
        }

        async function fetchRecipesAndIngredients() {
            const messages = ["Reduciendo imagen...", "Buscando ingredientes...", "Pensando combinaciones...", "Redactando recetas..."];
            let msgIdx = 0;
            const msgInterval = setInterval(() => {
                loadingSubtext.innerText = messages[++msgIdx % messages.length];
            }, 2000);

            let promptContext = `Analiza estas fotos del contenido de una nevera o despensa. Devuelve UNICAMENTE un objeto JSON válido, sin textos antes ni después, ni bloques de código markdown.
            Formato exacto:
            {
              "ingredients": ["ingrediente1", "ingrediente2"],
              "recipes": [
                {
                  "title": "Nombre de la receta",
                  "prep_time": "30 min",
                  "steps": ["paso 1", "paso 2"]
                }
              ]
            }`;

            try {
                let parts = [{ text: promptContext }];
                state.images.forEach(img => {
                    parts.push({ inlineData: { mimeType: img.mimeType, data: img.data } });
                });

                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: parts }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) throw new Error("Error en el servidor");

                const data = await response.json();
                
                if (!data.candidates || !data.candidates[0] || !data.candidates[0].content || !data.candidates[0].content.parts || !data.candidates[0].content.parts[0]) {
                     throw new Error("La IA no detectó comida válida o no devolvió una respuesta correcta.");
                }

                const responseText = data.candidates[0].content.parts[0].text;
                const cleanJson = responseText.replace(/```json\n?|```\n?/g, '').trim();
                const aiResult = JSON.parse(cleanJson);
                
                clearInterval(msgInterval);
                return aiResult;

            } catch (error) {
                clearInterval(msgInterval);
                alert("Hubo un error al generar las recetas.\nDetalle: " + error.message);
                showScreen('home');
                return null;
            }
        }

        async function analyzeImages() {
            if (state.images.length === 0) {
                alert("Por favor, sube al menos una foto.");
                return;
            }
            showScreen('loading');
            const result = await fetchRecipesAndIngredients();
            
            if (result) {
                state.ingredients = result.ingredients || [];
                state.recipes = result.recipes || [];
                renderResults();
                showScreen('results');
            }
        }

        function renderResults() {
            const tagsContainer = document.getElementById('detectedIngredients');
            tagsContainer.innerHTML = '';
            state.ingredients.forEach(ing => {
                const span = document.createElement('span');
                span.className = 'tag';
                span.innerText = ing;
                tagsContainer.appendChild(span);
            });

            const recipesContainer = document.getElementById('recipesContainer');
            recipesContainer.innerHTML = '';
            state.recipes.forEach(recipe => {
                const card = document.createElement('div');
                card.className = 'recipe-card';
                card.innerHTML = `
                    <div class="recipe-title">${recipe.title}</div>
                    <div class="recipe-meta">
                        <span>⏱️ ${recipe.prep_time}</span>
                        <span>🥣 Fácil</span>
                    </div>
                    <ol class="steps-list">
                        ${recipe.steps.map(step => `<li>${step}</li>`).join('')}
                    </ol>
                `;
                recipesContainer.appendChild(card);
            });
        }
    </script>
</body>
</html>
